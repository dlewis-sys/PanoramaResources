<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solara | Resource Guide</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --pano-navy: #161242;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }

        /* Custom scrollbar for a cleaner look */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Ensure the sidebar stays fixed properly */
        .sidebar-height { height: 100vh; height: 100dvh; }
    </style>
</head>
<body class="antialiased text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON HELPER ---
        const Icon = ({ name, className = "w-5 h-5", color }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className} style={{ color: color }}></i>;
        };

        // --- DATA OBJECT ---
        const TOOL_DATA = {
            mtss: { 
                title: "MTSS & Support", 
                icon: "users", 
                color: "#1FAA4A",
                tools: [
                    { title: "SMART Goal Generator", description: "Design high-quality intervention targets.", prompt: "Generate a SMART goal statement for a student in Tier 2 support...", fields: ["Current Level", "Target", "Review Date"] },
                    { title: "Behavior Plan Draft", description: "Standardized behavioral intervention logic.", prompt: "Draft a Tier 3 behavior support plan focusing on positive reinforcement...", fields: ["Triggers", "Function", "Supports"] }
                ]
            },
            instruction: { 
                title: "Instruction", 
                icon: "book-open", 
                color: "#006DB0",
                tools: [
                    { title: "Rubric Builder", description: "Standards-aligned performance scales.", prompt: "Create a 4-level rubric for a K-12 writing assignment...", fields: ["Criteria", "Performance Levels"] }
                ]
            },
            family: { 
                title: "Family Engagement", 
                icon: "heart", 
                color: "#867EBB",
                tools: [
                    { title: "Progress Update", description: "Strengths-based family communication.", prompt: "Write a short, encouraging update for a family regarding their child's progress...", fields: ["Student Name", "Positive Growth"] }
                ]
            }
        };

        const ToolCard = ({ tool, color }) => {
            const [open, setOpen] = useState(false);
            const [copied, setCopied] = useState(false);

            const handleCopy = () => {
                navigator.clipboard.writeText(tool.prompt);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4 shadow-sm hover:border-slate-300 transition-all">
                    <button 
                        onClick={() => setOpen(!open)}
                        className="w-full p-5 text-left flex items-center justify-between group"
                    >
                        <div className="flex items-center gap-4">
                            <div className="w-1.5 h-10 rounded-full" style={{ backgroundColor: color }}></div>
                            <div>
                                <h3 className="font-bold text-slate-900 text-lg">{tool.title}</h3>
                                <p className="text-sm text-slate-500">{tool.description}</p>
                            </div>
                        </div>
                        <Icon name={open ? "chevron-up" : "chevron-down"} className="text-slate-300 group-hover:text-slate-500 transition-colors" />
                    </button>
                    
                    {open && (
                        <div className="p-6 bg-slate-50 border-t border-slate-100">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Framework Logic</span>
                                <button 
                                    onClick={handleCopy}
                                    className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold text-white transition-all ${copied ? 'bg-green-600' : 'bg-slate-900 hover:bg-black'}`}
                                >
                                    <Icon name={copied ? "check" : "copy"} className="w-3 h-3" />
                                    {copied ? "Copied" : "Copy"}
                                </button>
                            </div>
                            <div className="p-4 bg-white border border-slate-200 rounded-lg text-sm italic text-slate-700 leading-relaxed shadow-inner">
                                {tool.prompt}
                            </div>
                            <div className="mt-4 flex flex-wrap gap-2">
                                {tool.fields.map((f, i) => (
                                    <span key={i} className="px-3 py-1 bg-white border border-slate-200 rounded-full text-[11px] font-semibold text-slate-500 italic">
                                        • {f}
                                    </span>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeCat, setActiveCat] = useState('all');
            const [search, setSearch] = useState('');

            const filteredData = useMemo(() => {
                let items = [];
                Object.entries(TOOL_DATA).forEach(([key, cat]) => {
                    if (activeCat === 'all' || activeCat === key) {
                        cat.tools.forEach(t => items.push({ ...t, color: cat.color, catTitle: cat.title }));
                    }
                });
                if (search) {
                    items = items.filter(i => i.title.toLowerCase().includes(search.toLowerCase()) || i.description.toLowerCase().includes(search.toLowerCase()));
                }
                return items;
            }, [activeCat, search]);

            return (
                <div className="flex w-full min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-72 bg-[#161242] text-white fixed sidebar-height flex flex-col z-20 shadow-xl">
                        <div className="p-8">
                            <h1 className="text-2xl font-black tracking-tighter italic">SOLARA</h1>
                            <div className="h-1 w-12 bg-[#1FAA4A] mt-2"></div>
                        </div>

                        <nav className="flex-1 px-4 space-y-1 overflow-y-auto custom-scrollbar">
                            <button 
                                onClick={() => setActiveCat('all')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${activeCat === 'all' ? 'bg-white/10 font-bold text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                            >
                                <Icon name="grid" /> All Resources
                            </button>
                            
                            <div className="pt-6 pb-2 px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Categories</div>
                            
                            {Object.entries(TOOL_DATA).map(([key, cat]) => (
                                <button 
                                    key={key}
                                    onClick={() => setActiveCat(key)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${activeCat === key ? 'bg-white/10 font-bold text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                                >
                                    <Icon name={cat.icon} color={cat.color} /> {cat.title}
                                </button>
                            ))}
                        </nav>

                        <div className="p-8 border-t border-white/5">
                            <p className="text-[10px] text-slate-500 font-medium leading-relaxed">
                                &copy; 2026 Solara Frameworks.<br/>Designated for District Use.
                            </p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 ml-72 bg-slate-50 p-12 min-h-screen">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                                <div>
                                    <h2 className="text-4xl font-black text-slate-900 tracking-tight">
                                        {activeCat === 'all' ? "Resource Library" : TOOL_DATA[activeCat].title}
                                    </h2>
                                    <p className="text-slate-500 mt-2">Browse standardized prompts and logical frameworks.</p>
                                </div>
                                
                                <div className="relative">
                                    <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" />
                                    <input 
                                        type="text" 
                                        placeholder="Search tools..." 
                                        className="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-green-500 w-64 shadow-sm"
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-2">
                                {filteredData.length > 0 ? (
                                    filteredData.map((tool, i) => (
                                        <ToolCard key={i} tool={tool} color={tool.color} />
                                    ))
                                ) : (
                                    <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
                                        <Icon name="search-x" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                                        <p className="text-slate-500 font-medium">No tools match your search criteria.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
