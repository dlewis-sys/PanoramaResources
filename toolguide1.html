<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solara | Custom Tool Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-gradient { background: linear-gradient(180deg, #161242 0%, #006DB0 100%); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- THEME COLORS ---
        const COLORS = {
            navy: "#161242",
            green: "#1FAA4A",
            teal: "#00A1BB",
            lavender: "#867EBB",
            lime: "#9FCC3B"
        };

        // --- ICON COMPONENT ---
        const Icon = ({ name, className = "w-5 h-5", color }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ color: color }}></i>;
        };

        // --- TOOL CARD COMPONENT ---
        const ToolCard = ({ tool, accentColor }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [copied, setCopied] = useState(false);

            const copyToClipboard = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(tool.prompt || tool.instructions);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-white rounded-2xl border border-slate-200 mb-4 overflow-hidden transition-all hover:shadow-md">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full p-6 text-left flex justify-between items-center focus:outline-none"
                    >
                        <div>
                            <h3 className="text-xl font-bold text-slate-900">{tool.title}</h3>
                            <p className="text-slate-500 text-sm mt-1">{tool.description}</p>
                        </div>
                        <Icon name={isOpen ? "chevron-up" : "chevron-down"} className="text-slate-400 w-6 h-6" />
                    </button>
                    
                    {isOpen && (
                        <div className="px-6 pb-6 bg-slate-50/50 border-t border-slate-100">
                            <div className="mt-4">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-[10px] font-bold uppercase tracking-tighter text-slate-400">Logic & Instructions</span>
                                    <button 
                                        onClick={copyToClipboard}
                                        className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold text-white transition-all ${copied ? 'bg-green-500' : 'bg-slate-900'}`}
                                    >
                                        <Icon name={copied ? "check" : "copy"} className="w-3 h-3" />
                                        {copied ? "Copied!" : "Copy"}
                                    </button>
                                </div>
                                <div className="p-4 bg-white border border-slate-200 rounded-xl text-sm italic text-slate-600 shadow-sm whitespace-pre-wrap">
                                    {tool.prompt || tool.instructions}
                                </div>
                            </div>
                            
                            <div className="mt-4">
                                <span className="text-[10px] font-bold uppercase text-slate-400">Recommended Data Fields</span>
                                <div className="flex flex-wrap gap-2 mt-2">
                                    {tool.fields?.map((field, idx) => (
                                        <span key={idx} className="bg-white px-3 py-1 rounded-full border border-slate-200 text-xs text
