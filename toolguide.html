        // --- ICON COMPONENT (Fixed for Tailwind/Lucide) ---
        const Icon = ({ name, className = "w-5 h-5", style = {} }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={style}></i>;
        };

        // --- GEMINI API UTILS ---
        const callGemini = async (userQuery, apiKey) => {
            if (!apiKey) throw new Error("Please enter your API Key in the sidebar.");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            
            const systemPrompt = `You are the Solara Tool Assistant. Return ONLY a JSON object. 
            Schema: {"title": "String", "description": "String", "instructions": "String", "category": "String", "recommendedFields": ["String"]}`;

            const payload = {
                contents: [{ parts: [{ text: `Educator Need: ${userQuery}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error?.message || "API request failed");
            return JSON.parse(result.candidates[0].content.parts[0].text);
        };
